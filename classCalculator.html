        class Calculator {
            number= 100;
            constructor(avalue, bvalue){
               this.a = avalue;
               this.b= bvalue;
            }
            add(){
                return this.a + this.b;
            }

            sub( b) {
                return this.number - b;
            }
           static mul(a, b) {
                return a * b;
            }
           static div(a, b) {
                return a / b;
            }
        }

      // inheritance
        class Human extends Animal{
            constructor(name_value, avarage_age_value, habitant_value , location_value, gender_value){

     // polymorphism
      class Pet extends Animal{
             constructor(name_value, avarage_age_value, habitant_value , isVaccenied, owner_name){
                
                super(name_value, avarage_age_value, habitant_value)

                this.isVaccenied=isVaccenied;
                this.owner_name= owner_name;  
          }
         // polymorphism  overriding parents mehtod
          speak(){
              return ` ${this.name}  barks in evening.`;
          }

          walk(){
              return `${this.name} walks in park 7`
          }
      }
